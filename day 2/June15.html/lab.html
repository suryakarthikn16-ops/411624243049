<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <h1>Responsive Website</h1>

    <img src="PET.jpg" width="500px">

    <video controls class="video">
        <source src="video.mp4" type="video/mp4">
    </video>

    <table>
        <tr>
            <th>1</th>
            <th>Some Text</th>
            <th>Some Text</th>
        </tr>
        <tr>
            <th>2</th>
            <td>HI</td>
            <td>HELLO</td>
        </tr>
        <tr>
            <th>3</th>
            <td>A</td>
            <td>B</td>
        </tr>
    </table>

    <button class="btn">Click Me</button>

    <div class="grid-container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>
        <div class="box">8</div>
    </div>

</body>
</html>
